<div class="pop-up_search" [class.showSearch]="(ui.showSearch$ | async)">


  <div class="message">
    <span (click)="closeSearch()">
        <mat-icon matPrefix class="closebtn" >arrow_back</mat-icon>
    </span>
    <p>Search for Users or Blogs...</p>
    <span (click)="closeSearch()">
        <mat-icon matPrefix class="closebtn" >arrow_back</mat-icon>
    </span>
  </div>

  <div class="search-box">
    <mat-form-field appearance="outline" class="search-field">

      <mat-icon matPrefix>search</mat-icon>

      <input
        matInput
        [formControl]="searchControl"
        placeholder="Search..."
        autocomplete="off"
      >

      <button
        *ngIf="searchControl.value"
        mat-icon-button
        matSuffix
        (click)="searchControl.setValue('')"
        aria-label="Clear"
      >
        <mat-icon>close</mat-icon>
      </button>

    </mat-form-field>
  </div>

  <div class="choose">
    <button matButton="tonal" disabled class="btnmatang"> Blogs </button>
    <span></span>
    <button matButton="tonal" disabled class="btnmatang"> Users </button>
    <span></span>
  </div>

  

</div>
