<div class="pop-up_search">


  <div class="message">

    <p>Search for Users or Blogs...</p>

  </div>

  <div class="search-box">
    <mat-form-field appearance="outline" class="search-field">

      <mat-icon matPrefix>search</mat-icon>

      <input matInput [formControl]="searchControl" placeholder="Search..." autocomplete="off">

      <button *ngIf="searchControl.value" mat-icon-button matSuffix (click)="searchControl.setValue('')"
        aria-label="Clear">
        <mat-icon>close</mat-icon>
      </button>

    </mat-form-field>
  </div>

  <div class="choose">
    <button matButton="tonal" (click)="showBlogs()" class="btnmatang" [class.btnmatangchoose]="isBlogs"> Blogs </button>
    <button matButton="tonal" (click)="showUsers()" class="btnmatang" [class.btnmatangchoose]="!isBlogs"> Users
    </button>
  </div>

  <div class="blogs" *ngIf="showTheBlogs">
    <app-blog-list-component mode="SEARCH" [search_word]="searchControl.value ?? ''"></app-blog-list-component>
  </div>


   <div class="blogs" *ngIf="showTheUsers">
     <app-users mode="SEARCH" [username_or_searchWord]="searchControl.value ?? ''"></app-users>
  </div>

</div>
