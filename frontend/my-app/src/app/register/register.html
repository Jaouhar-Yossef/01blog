<div class="register">
               <h2>Create Account</h2>
               <div class="input-group">
                 <input  (input)="checkUserName()" [(ngModel)]="username"  minlength="3" maxlength="15" type="text" placeholder="Enter your userName:">
               </div>

               <div class="input-group">
                 <input maxlength="50" [(ngModel)]="email"  (input)="checkEmail()"  type="email" placeholder="Enter your email:">
               </div>
               
               <div class="input-group1">
                 <input   [(ngModel)]="passWord" (input)="checkPassword()" maxlength="20" [type]="showPassword ? 'text' : 'password'" placeholder="Enter your password:" >
                 <div class="circle"  (click)="onClickCircle()" >
                       <div class="circle2"></div>
                       <div class="line-container" [class.active]="showPassword" ></div>
                 </div>
                 <input (input)="checkPassword()" [(ngModel)]="ConfirmPassWord"  maxlength="20" [type]="showPassword ? 'text' : 'password'" placeholder="Confirm password:">
               </div>
              
                <div class="rules">
                   <label>
                     <input type="checkbox"   [checked]="isfilled"/>
                    All fields must be <strong>filled</strong>
                  </label>

                  <label>
                    <input type="checkbox" [checked]="ispassWordValid" />
                    Password must be at least <strong>6 characters</strong>
                  </label>
                
                  <label>
                    <input type="checkbox" [checked]="isEmailValid" />
                      Email must be like <strong>example@gmail.com</strong>
                  </label>
                </div>



               <div class="btn-SignUp">
                    <button class="SignUp" (click)="check()">Sign Up</button> <!--  // -->
               </div>
               
               <div class="forlogin">
                <div class="linksgoto">
                   <span>Already have an account?</span>
                  <p class="forloginbtn" (click)="goToLogin()">Login here</p>
                </div>
                  <div class="linksgoto">
                    <span>Go back to the home</span>
                    <a class="forloginbtn" href="/">Go Home</a>
                  </div>
              </div>     
</div>
