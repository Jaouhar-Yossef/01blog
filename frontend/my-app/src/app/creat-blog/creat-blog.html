<div class="create-blog-container">
  <div class="divCreatblog">


    <h2>Create New Blog Post</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">

        <mat-form-field class="example-full-width">
          <mat-label>Enter blog title</mat-label>
          <input matInput formControlName="title">
        </mat-form-field>

      </div>

      <div class="form-group mb-5">
        <!-- <textarea class="the-content" formControlName="content" placeholder="Write your blog content..."
          maxlength="1000" rows="3"></textarea> -->

        <mat-form-field class="example-full-width">
          <mat-label>Write your blog content</mat-label>
          <textarea maxlength="1000" rows="3" matInput formControlName="content" ></textarea>
        </mat-form-field>

      </div>




      <div class="form-group-media">
        <div class="selectmedia">
          <label for="media">Upload (1 to 5 files)</label>
          <div class="selectmedia-divimgs">
            <input class="selectmedia-input" type="file" id="media" multiple accept="image/*,video/*"
              (change)="onFileSelected($event)" />
            <label for="media" class="selectmedia-label">
              <span>Select images or videos</span>
              <img src="./../../assets/images/image.svg" alt="Select media" />
            </label>
          </div>
        </div>

        <div class="preview">
          <div class="preview-item" *ngFor="let item of files; let i = index">
            <img *ngIf="item.type === 'image'" [src]="item.url" />
            <video *ngIf="item.type === 'video'" [src]="item.url" controls></video>
            <button class="remove-btn" type="button" (click)="removeFile(i)">✕</button>
          </div>
        </div>
      </div>

      <div class="form-actions">

        <button type="submit" class="botnpub btn btn-primary" [disabled]="form.invalid">
          Publish Blog
        </button>

        <div class="divclearandcancel">
          <button type="button" class="btn btn-secondary Cancel" (click)="onCancel()"> Go Back </button>
          <button type="button" class="btn btn-secondary Cancel" (click)="clearForm()"> clear </button>
        </div>
      </div>
    </form>

  </div>
</div>
