<div class="edit-profile-container">
    <mat-card class="profile-card">

        <mat-card-header>
            <mat-card-title>Edit Profile</mat-card-title>
            <mat-card-subtitle>Update your personal information</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>

            <div class="profile-image">
                <div class="imgprofile" *ngIf="imgUrl.length > 0">
                    <img [src]="imgUrl" alt="Profile Image">
                    <button class="remove-btn" type="button" (click)="removeFile()">✕</button>
                </div>
                <input class="selectmedia-input" type="file" id="media" (change)="onFileSelected($event)" />
            </div>
            <form [formGroup]="form">

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Username</mat-label>
                    <input matInput formControlName="username">
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email</mat-label>
                    <input matInput type="email" formControlName="email">
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>New Password</mat-label>
                    <input matInput type="password" formControlName="password">
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Confirm Password</mat-label>
                    <input matInput type="password" formControlName="confirmPassword">
                </mat-form-field>

            </form>

        </mat-card-content>

        <mat-card-actions align="end">
            <button mat-button color="warn">Cancel</button>
            <button mat-raised-button color="primary" (click)="submit()">Save Changes</button>
        </mat-card-actions>

    </mat-card>
</div>
