<div class="users-list">
    <ng-container *ngIf="Users$ | async as users">
        <ng-container *ngIf="users.length > 0 ; else noContent">
            <div class="user" *ngFor="let user of users; trackBy: trackById">

                <div class="blogheader_left">
                    <div class="divuserimg">

                        <img (click)="goToProfile(user.username)" class="imguser"
                            [src]="imageService.getUserImage(user.imageUrl)"
                            (error)="imageService.onImgUserError($event)" alt="">
                            
                    </div>
                    <div class="nameandnmbblogs">
                        <p class="creat-by" (click)="goToProfile(user.username)">
                            {{ user?.username }}
                        </p>
                        <button (click)="goToProfile(user.username)" matButton="tonal" disabled class="btnmatang">
                            {{ user.blogsCont }} Blogs
                        </button>
                    </div>


                </div>


                <div class="btnEdit" *ngIf="user.yourProfile">
                    <button (click)="goToProfile(user.username)" type="button" matButton="tonal" class="btn">
                        your profile <mat-icon>person</mat-icon>
                    </button>
                </div>

                <div class="btnEdit" *ngIf="!user.yourProfile">
                    <!-- Following -->
                    <button *ngIf="user.following" type="button" matButton="tonal" class="btn following"
                        (click)="FollowTheUser(user.username , 'unfollow')">
                        <span>Following</span> <mat-icon class="iconclass">how_to_reg</mat-icon>
                    </button>

                    <!-- Follow -->
                    <button *ngIf="!user.following && !user.follower" type="button" matButton="tonal" class="btn"
                        (click)="FollowTheUser(user.username , 'follow')">
                        <span>Follow</span> <mat-icon class="iconclass">person_add</mat-icon>
                    </button>

                    <!-- Follow-back -->
                    <button *ngIf="!user.following && user.follower" type="button" matButton="tonal" class="btn"
                        (click)="FollowTheUser(user.username , 'followBack')">
                        <span>Follow-back</span> <mat-icon class="iconclass">person_add</mat-icon>
                    </button>

                    <!-- Report -->
                    <button (click)="ReportUsers(user.username)" type="button" matButton="tonal" class="btnn">
                        <span>Report</span> <mat-icon>policy</mat-icon>
                    </button>
                </div>

            </div>
            <div *ngIf="users.length > 0" class="userbbottom">
                <mat-icon>groups</mat-icon>
                <span>The last user</span>
            </div>
        </ng-container>

    </ng-container>
    <div observeIntersection (visible)="loadUsers()" class="observer"></div>
    <ng-template #noContent>
        <div class="noContent">
            <div>
                <p class="noContent-text">Nothing here yet 👀</p>
                <span class="noContent-subtext">There is only you now..</span>
            </div>
            <img class="noContent-img" src="./../../assets/images/group.svg" alt="">

        </div>
    </ng-template>

</div>
