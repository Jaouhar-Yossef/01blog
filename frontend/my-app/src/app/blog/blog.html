<div class="blogdiv">
  <ng-container *ngIf="blog$ | async as blog">
    <div class="blog">
      <div class="blogheader">
        <div class="blogheader_left">

          <img (click)="goToProfile(blog?.createdByUsername)" class="imguser"
            [src]="imageService.getUserImage(blog?.createdByUrlimg)" (error)="imageService.onImgUserError($event)"
            alt="">

          <div class="blogheader_left_right">
            <p class="creat-by" (click)="goToProfile(blog?.createdByUsername)"> {{ blog?.createdByUsername }} </p>
            <p class="creat-at"> {{ this.creat_at }}</p>
          </div>
        </div>

        <div class="blogheader_right">

          <mat-icon class="imgskip" [matMenuTriggerFor]="statusMenu"> menu </mat-icon>

          <mat-menu #statusMenu="matMenu">
            <div *ngIf="iSmyBlog">
              <button mat-menu-item (click)="editBlog(blog.id)"> <mat-icon> edit_document </mat-icon> Edit </button>
              <button mat-menu-item (click)="deleteBlog(blog.id)"> <mat-icon> delete </mat-icon> Delete </button>
            </div>
            <div *ngIf="!iSmyBlog">
              <button mat-menu-item (click)="reportBlog(blog.id)"> <mat-icon> flag </mat-icon> Report </button>
            </div>
          </mat-menu>

        </div>
      </div>

      <div class="card">
        <div class="titleAndDiscription">
          <p class="title"> {{ blog?.title }} </p>

          <div class="divcontent">
            <p class="content">
              {{
              AllTheDiscription
              ? blog?.content
              : (blog?.content | slice:0:30)
              }}

              <span class="read-more" (click)="toggleDescription()" *ngIf="blog?.content?.length > 30">
                {{ AllTheDiscription ? '... Read less' : '... Read more' }}
              </span>
            </p>
          </div>


          <div class="theMedia" *ngIf="blog.media?.length > 0; else nomedia">

            <mat-icon class="big-mat-iconbtn" [class.showicon]="currentIndex != 0" (click)="minusCurrentIndex()"
              *ngIf="blog.media?.length > 1">arrow_left</mat-icon>


            <img *ngIf="theMedia[currentIndex].type === 'IMAGE'"
              [src]="imageService.getBlogImage(theMedia[currentIndex].url)"
              (error)="imageService.onImgBlogError($event)" class="realimg" />

            <div *ngIf="theMedia[currentIndex].type === 'VIDEO'" class="divVideo">
              <img *ngIf="videoNotPlay" class="play-icon" src="./../../assets/playvideo.png" alt="">
              <video [src]="baseUrl + theMedia[currentIndex].url" loop playsinline (click)="toggleVideo($event)"
                class="thevideo"></video>
            </div>

1


            <mat-icon class="big-mat-icon" (click)="addCurrentIndex()"
              *ngIf="blog.media?.length > 1 && (currentIndex == 0 || currentIndex >  0) ">arrow_right</mat-icon>

          </div>


          <div class="styleimgs" *ngIf="blog.media?.length > 1">
            <span *ngFor="let m of blog.media; let i = index" [class.active]="i === currentIndex"></span>
          </div>

          <ng-template #nomedia>

            <div class="theNoMedia">
              <img class="noContent-img" src="./../../assets/images/noContent.svg" alt="">
            </div>
          </ng-template>

          <div class="blogbotoom">
            <button mat-fab extended [disabled]="blog.status === 'hidden'" (click)="toggleLike(blog.status)"
              class="liked">
              <span>
                <img class="buttonheart" [src]="blog?.liked 
                        ? './../../assets/heart.png' 
                        : './../../assets/heart2.png'" alt="" />
                Like {{ blog?.numbLiked }}
              </span>
            </button>

            <button mat-fab extended [disabled]="blog.status === 'hidden'" (click)="toggleSave(blog.status)">
              <mat-icon>
                {{ blog?.saved ? 'bookmark_added' : 'bookmark_border' }}
              </mat-icon>
              <span>
                {{ blog?.saved ? 'Saved' : 'Save' }}
              </span>
            </button>

          </div>

        </div>
      </div>
      <app-comment [statuBlog]="blog.status"></app-comment>
    </div>
  </ng-container>
</div>
